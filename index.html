<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Python Slides</title>

  <!-- Reveal.js CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js/dist/theme/black.css">
</head>

<body>
<div class="reveal">
  <div class="slides">

    <!-- Slide 1 -->
    <section>
      <h1>Python Basics</h1>
      <p>Welcome to Python presentation</p>
    </section>

    <!-- Slide 2 -->
    <section>
      <h2>What is Python?</h2>
      <p>Python is a simple and powerful programming language.</p>
    </section>

    <!-- Slide 3 (Code 1) -->
    <section>
      <h2>Print Example</h2>
      <pre><code>
print("Hello, World!")
      </code></pre>
    </section>

    <!-- Slide 4 (Code 2) -->
    <section>
      <h2>Variables</h2>
      <pre><code>
x = 10
y = 5
print(x + y)
      </code></pre>
    </section>

    <!-- Slide 5 (Code 3) -->
    <section>
      <h2>Loop Example</h2>
      <pre><code>
for i in range(5):
    print(i)
      </code></pre>
    </section>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>
<script>
  Reveal.initialize();
</script>

</body>
</html>
